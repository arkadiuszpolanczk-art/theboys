<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE BOYS – SEASON 5</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            background: radial-gradient(circle at center, #1a0000 0%, #000 70%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Oswald', sans-serif;
        }

        .bg-glow {
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(255,0,0,0.2) 0%, transparent 70%);
            filter: blur(120px);
            border-radius: 50%;
            z-index: 1;
        }

        .container {
            text-align: center;
            z-index: 2;
            width: 90%;
            max-width: 1100px;
        }

        .logo {
            width: 600px;
            max-width: 90%;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 15px rgba(255, 0, 0, 0.8));
            animation: logoPulse 4s ease-in-out infinite;
        }

        @keyframes logoPulse {
            0%, 100% { filter: drop-shadow(0 0 15px red); }
            50% { filter: drop-shadow(0 0 35px red); }
        }

        .season {
            color: #fff;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 40px;
            letter-spacing: 5px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.8), 0 0 20px rgba(255, 0, 0, 0.5);
        }

        .season span {
            color: #ff2a2a;
            animation: flicker 2s infinite;
        }

        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; }
            20%, 24%, 55% { opacity: 0.3; }
        }

        .countdown {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 50px;
        }

        .time-box {
            background: rgba(10, 0, 0, 0.8);
            border: 2px solid #ff2a2a;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.3);
            padding: 15px 25px;
            border-radius: 4px;
            color: #ff2a2a;
            min-width: 120px;
        }

        .time-box div:first-child {
            font-size: 3.5rem;
            font-weight: 900;
            line-height: 1;
        }

        .label {
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 2px;
            margin-top: 5px;
            color: #fff;
        }

        .progress-container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }

        .progress-info {
            color: #ff2a2a;
            text-align: right;
            font-size: 0.8rem;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .progress-wrapper {
            width: 100%;
            height: 12px;
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid #ff2a2a;
            border-radius: 2px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.2);
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #660000 0%, #ff0000 50%, #660000 100%);
            background-size: 200% 100%;
            animation: laserMove 3s linear infinite;
            box-shadow: 0 0 20px #ff0000;
            transition: width 0.5s ease-out;
        }

        @keyframes laserMove {
            0% { background-position: 200% 0%; }
            100% { background-position: 0% 0%; }
        }
    </style>
</head>
<body>

<div class="bg-glow"></div>

<div class="container">
    <img src="logo.png" class="logo" alt="THE BOYS LOGO">

    <div class="season">Sezon 5 – Premiera <span>8 Kwietnia</span></div>

    <div class="countdown">
        <div class="time-box">
            <div id="days">00</div>
            <div class="label">DNI</div>
        </div>
        <div class="time-box">
            <div id="hours">00</div>
            <div class="label">GODZINY</div>
        </div>
        <div class="time-box">
            <div id="minutes">00</div>
            <div class="label">MINUTY</div>
        </div>
        <div class="time-box">
            <div id="seconds">00</div>
            <div class="label">SEKUNDY</div>
        </div>
    </div>

    <div class="progress-container">
        <div class="progress-info" id="percLabel">POSTĘP: 0%</div>
        <div class="progress-wrapper">
            <div class="progress-bar" id="progressBar"></div>
        </div>
    </div>
</div>

<script>
    // TWOJE NOWE USTAWIENIA:
    // Start: 22.02.2026, 23:40 (Miesiąc 1 = Luty w JS)
    const startDate = new Date(2026, 1, 22, 23, 40, 0);
    
    // Cel: 08.04.2026 (Miesiąc 3 = Kwiecień w JS)
    const targetDate = new Date(2026, 3, 8, 0, 0, 0);

    function updateCountdown(){
        const now = new Date();
        const diff = targetDate - now;

        if(diff <= 0){
            document.querySelector(".container").innerHTML = "<h1 style='color:white; font-size:5rem; text-shadow: 0 0 30px red;'>OBEJRZYJ TO,<br>W KOŃCU!</h1>";
            return;
        }

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((diff / (1000 * 60)) % 60);
        const seconds = Math.floor((diff / 1000) % 60);

        document.getElementById("days").textContent = days.toString().padStart(2, '0');
        document.getElementById("hours").textContent = hours.toString().padStart(2, '0');
        document.getElementById("minutes").textContent = minutes.toString().padStart(2, '0');
        document.getElementById("seconds").textContent = seconds.toString().padStart(2, '0');

        // OBLICZANIE PASKA POSTĘPU
        const totalDuration = targetDate - startDate;
        const elapsed = now - startDate;
        
        let progress = (elapsed / totalDuration) * 100;
        
        // Zabezpieczenie przed ujemnym paskiem (jeśli odpalisz przed 23:40)
        progress = Math.max(0, Math.min(100, progress));

        document.getElementById("progressBar").style.width = progress + "%";
        document.getElementById("percLabel").textContent = `ŁADOWANIE PROTOKOŁU V: ${progress.toFixed(4)}%`;
    }

    setInterval(updateCountdown, 1000);
    updateCountdown();
</script>

</body>
</html>
